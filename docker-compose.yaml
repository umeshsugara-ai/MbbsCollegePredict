# Compose file for the MBBS predictor.
#
# Environment-variable precedence:
#   1. `environment:` keys below           ← HIGHEST priority. Override here
#                                             when you want compose to be the
#                                             authoritative source.
#   2. `env_file: .env` (at the bottom)    ← Optional host-level override.
#                                             If a key isn't in the environment
#                                             block above and .env exists on
#                                             the host, its value is injected
#                                             at compose-time.
#   3. dotenv inside the container         ← Final fallback. .env is now baked
#                                             into the image (per team decision,
#                                             not in .dockerignore), so dotenv
#                                             reads it at boot for any keys
#                                             not set by the layers above.
#
# So: compose `environment:` wins over host `.env` wins over baked-in `.env`.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: globalmbbs-predictor:latest
    container_name: globalmbbs-predictor
    restart: unless-stopped
    ports:
      - "3000:3000"

    # ── Authoritative overrides ──
    # Uncomment any line to force the compose value (overrides .env).
    environment:
      NODE_ENV: production
      PORT: "3000"
      # GEMINI_API_KEY: "<paste-here-to-override-.env>"
      # MONGODB_URI: "<paste-here-to-override-.env>"
      # MONGODB_DB: "mbbs_predictor"
      # APP_URL: "https://predictor.vidysea.com"

    # ── Fallback values from .env ──
    # `required: false` — host .env is optional. Per team decision, .env is
    # baked into the image (no longer in .dockerignore), so the container
    # always has its values via dotenv at boot. The env_file here just
    # provides an optional host-level override mechanism.
    env_file:
      - path: .env
        required: false

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
